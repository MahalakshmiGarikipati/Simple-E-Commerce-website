<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-image: url('https://images.rawpixel.com/image_800/czNmcy1wcml2YXRlL3Jhd3BpeGVsX2ltYWdlcy93ZWJzaXRlX2NvbnRlbnQvbHIvdjEwMTYtYy0wNi1rc2g2bXZ2bi5qcGc.jpg');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed ;
            color: #fff;
        }

        .container {
            width: 700px;
            margin: 100px auto;
            background-color: rgba(26, 26, 25, 0.468);
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0px 0px 10px 0px rgba(0,0,0,0.1);
        }

        .container h2 {
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .btn {
            background-color: #007bff;
            color: #fff;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        
        }

        .btn:hover {
            background-color: #0056b3;
        }

    </style>
</head>
<body>
    <div class="container">
        <form action="mailto:mahalakshmigarikipati54@gmail.com" method="post" target="_blank" enctype="text/plain">
            <h2>Registration Form</h2>
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="username" name="username"  required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
                <label> Student Id</label>
                <input type="number" id="number" name="number" required>
            </div>
            <div class="input-group">
                <label> Mobile Number</label>
                <input type="tel" name="mobilenumber" minlength="10" maxlength="10" pattern="[0-9]{10}" required>
            </div>
            <div class="input-group" >
                <label> Date Of Birth</label>
                <input type="date" id="number" name="number" required>
            </div>
            <div style="margin-bottom: 20px;">
                <label>Gender:</label>
                <input type="radio" name="gender" value="male" >Male
                <input type="radio"  name="gender" value="female" >Female
            </div>
            
            <div class="input-group">
                <label> Upload Resume </label>
                <input type="file" id="file" name="file" required>
            </div>
            <div class="input-group" align="center">
                <button type="submit" class="btn">Register</button>   
            </div>
    
        </form>
    </div>
    
</body>
</html>
