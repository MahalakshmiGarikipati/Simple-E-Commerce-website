<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <style>
        body {

            background-image: url(http://www.exceptnothing.com/wp-content/uploads/2011/12/colorPulse_V4.jpg);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            background-color:rgba(0, 0, 0, 0.1) ;
            box-shadow: 0 0 10px rgb(206, 200, 200);
            width:270px;
        }
        
        .container h2 {
            margin: 30px;
            text-align: center;
        }

        .container form {
            display: flex;
            flex-direction: column;
        }

        .container input[type="text"],
        .container input[type="password"] {
            padding: 10px;
            margin-bottom: 30px;
            background: transparent;
            outline: none;
            box-shadow: 0 0 4px white;
            border-radius: 30px;
            border: none;
            color: white;
        }

        .container button {
           
            background:transparent;
            color: white;
            box-shadow: 0 0 4px white;
            border: none;
            border-radius: 30px;
            width: 70px;
            height: 30px;
            margin: 20px 90px;
            cursor: pointer;

        }

        .container button:hover {
            background-color:rgb(255, 77, 0);
            box-shadow: 0 0 4px rgb(255, 77, 0);
        }
        a{
            padding:15px 10px;
        }
        span{
            color:rgb(101, 244, 125) ;

        }
    </style>
</head>
<body>
    <div class="container">
        <h2>LogIn</h2>
        <form action="" >
            
            <input type="text" id="username" name="username" placeholder="Username" required>
            <input type="password" id="password" name="password" placeholder="Password" required> 
            <button type="submit">Login</button>
            <div align="center" style="display: flex;">
                <p>don't u have an account?</p> 
                <a href="signup.html"><span>Signup</span></a>
            </div>
        </form>
        
    </div>
</body>
</html>
